<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blasphemous - Browser Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 100%;
        }
        #game {
            border: 3px solid #444;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        canvas {
            display: block !important;
            border: 3px solid #444;
        }
        #ui {
            color: #fff;
            font-size: 18px;
            text-align: center;
            position: absolute;
            bottom: 20px;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
        }
        .stat {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game"></div>
    </div>
    <div id="ui">
        <div class="stat">Health: <span id="player-health">100</span>/100</div>
        <div class="stat">Enemies Defeated: <span id="enemies-defeated">0</span></div>
        <div class="stat">Controls: Arrow Keys to Move, SPACE to Jump, Z to Attack</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 600,
            parent: 'game',
            backgroundColor: '#222222',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 600 },
                    debug: false
                }
            },
            scene: GameScene
        };

        const game = new Phaser.Game(config);

        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
            }

            create() {
                // Create platforms
                this.platforms = this.physics.add.staticGroup();
                
                // Ground
                const ground = this.platforms.create(500, 590, null);
                ground.setScale(20, 2).refreshBody();
                this.add.rectangle(500, 590, 1000, 20, 0x333333);
                
                // Platforms
                const platformPositions = [
                    { x: 200, y: 450, width: 150 },
                    { x: 800, y: 450, width: 150 },
                    { x: 500, y: 300, width: 150 },
                ];

                platformPositions.forEach(pos => {
                    const plat = this.platforms.create(pos.x, pos.y, null);
                    plat.setScale(pos.width / 32, 1).refreshBody();
                    this.add.rectangle(pos.x, pos.y, pos.width, 20, 0x555555);
                });

                // Create player
                this.player = this.physics.add.sprite(100, 400, null);
                this.player.setBounce(0.2);
                this.player.setCollideWorldBounds(true);
                this.player.displayWidth = 30;
                this.player.displayHeight = 50;
                this.add.rectangle(100, 400, 30, 50, 0x00ff00);
                
                this.player.health = 100;
                this.player.isAttacking = false;
                this.player.attackCooldown = 0;
                this.player.facing = 1;

                this.physics.add.collider(this.player, this.platforms);

                // Create enemies
                this.enemies = this.physics.add.group();
                this.createEnemy(350, 380);
                this.createEnemy(650, 380);
                this.createEnemy(500, 200);

                this.physics.add.overlap(this.player, this.enemies, this.playerHitEnemy, null, this);

                // Input
                this.cursors = this.input.keyboard.createCursorKeys();
                this.input.keyboard.on('keydown-Z', () => this.playerAttack());

                this.enemiesDefeated = 0;
            }

            createEnemy(x, y) {
                const enemy = this.physics.add.sprite(x, y, null);
                enemy.setBounce(0.2);
                enemy.displayWidth = 25;
                enemy.displayHeight = 40;
                enemy.health = 30;
                enemy.maxHealth = 30;
                enemy.knockbackTimer = 0;
                enemy.direction = Math.random() > 0.5 ? 1 : -1;
                enemy.moveTimer = 0;
                
                this.add.rectangle(x, y, 25, 40, 0xff0000);
                
                enemy.healthBarBg = this.add.rectangle(x, y - 30, 30, 5, 0x333333);
                enemy.healthBarBg.setDepth(10);
                
                enemy.healthBar = this.add.rectangle(x, y - 30, 30, 5, 0xff0000);
                enemy.healthBar.setDepth(11);

                this.enemies.add(enemy);
                this.physics.add.collider(enemy, this.platforms);
            }

            playerAttack() {
                if (this.player.attackCooldown > 0) return;

                this.player.attackCooldown = 30;

                const swordX = this.player.x + (this.player.facing * 40);
                const sword = this.physics.add.sprite(swordX, this.player.y, null);
                sword.displayWidth = 40;
                sword.displayHeight = 15;
                this.add.rectangle(swordX, this.player.y, 40, 15, 0xffff00);

                this.physics.overlap(sword, this.enemies, (swordSprite, enemy) => {
                    if (enemy.active && enemy.health > 0) {
                        enemy.health -= 20;
                        enemy.knockbackTimer = 10;
                        enemy.setVelocityX(this.player.facing * 300);

                        const healthPercent = Math.max(0, enemy.health) / enemy.maxHealth;
                        enemy.healthBar.setScale(healthPercent, 1);

                        if (enemy.health <= 0) {
                            this.enemiesDefeated++;
                            document.getElementById('enemies-defeated').textContent = this.enemiesDefeated;
                        }
                    }
                });

                this.time.delayedCall(100, () => {
                    sword.destroy();
                });
            }

            playerHitEnemy(player, enemy) {
                if (enemy.active && enemy.health > 0) {
                    this.player.health -= 5;
                    document.getElementById('player-health').textContent = Math.max(0, this.player.health);

                    if (this.player.health <= 0) {
                        this.player.setTint(0xff0000);
                        this.physics.pause();
                        this.time.delayedCall(2000, () => this.scene.restart());
                    }
                }
            }

            update() {
                if (this.cursors.left.isDown) {
                    this.player.setVelocityX(-200);
                    this.player.facing = -1;
                } else if (this.cursors.right.isDown) {
                    this.player.setVelocityX(200);
                    this.player.facing = 1;
                } else {
                    this.player.setVelocityX(0);
                }

                if (this.cursors.space.isDown && this.player.body.touching.down) {
                    this.player.setVelocityY(-400);
                }

                if (this.player.attackCooldown > 0) {
                    this.player.attackCooldown--;
                }

                this.enemies.children.entries.forEach(enemy => {
                    if (!enemy.active || enemy.health <= 0) {
                        enemy.destroy();
                        return;
                    }

                    enemy.knockbackTimer--;

                    if (enemy.knockbackTimer <= 0) {
                        enemy.moveTimer--;
                        if (enemy.moveTimer <= 0) {
                            enemy.direction = Math.random() > 0.5 ? 1 : -1;
                            enemy.moveTimer = Phaser.Math.Between(60, 120);
                        }
                        enemy.setVelocityX(enemy.direction * 80);
                    }

                    if (enemy.healthBar && enemy.active) {
                        enemy.healthBarBg.x = enemy.x;
                        enemy.healthBarBg.y = enemy.y - 30;
                        enemy.healthBar.x = enemy.x;
                        enemy.healthBar.y = enemy.y - 30;
                    }
                });
            }
        }
    </script>
</body>
</html>
